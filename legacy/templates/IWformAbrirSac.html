<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../wwwroot/styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.css">

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="sortcut icon" href="../wwwroot/Ico.png" type="image/png" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> RBA - Abrir SAC </title>

  <style type="text/css">
    @import "https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700";

    :root {
      --rba-blue: #172e63;
      --rba-green: #a8cf45;
      --rba-light: #d8dce7;
      --rba-soft: #f4f6fa;
      --rba-text: #23304d;
    }

    html,
    body {
      min-height: 100%;
      background: var(--rba-soft) !important;
      color: var(--rba-text);
      font-family: Poppins, Arial, sans-serif;
    }

    .rba-page-header {
      background: rgba(255, 255, 255, 0.97);
      min-height: 74px;
      height: 74px;
      border-bottom: 1px solid var(--rba-light);
      box-shadow: 0 3px 16px rgba(23, 46, 99, 0.08);
      display: flex;
      align-items: center;
    }

    .rba-page-title {
      color: var(--rba-blue);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.01em;
    }

    .rba-back-btn {
      border: 0;
      background: transparent;
      color: var(--rba-blue);
      width: auto;
      padding: 0;
    }

    .rba-back-icon {
      font-size: 30px;
      color: var(--rba-blue);
      cursor: pointer;
    }

    .rba-header-logo-img {
      display: block;
      width: auto;
      height: auto;
      max-width: 145px;
      max-height: 54px;
      object-fit: contain;
    }

    .rba-sac-shell {
      max-width: 1180px;
      margin-left: auto;
      margin-right: auto;
      padding: 64px 24px 32px;
    }

    .rba-form-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .rba-field-group {
      margin-bottom: 28px;
    }

    .rba-field-label {
      color: var(--rba-blue);
      font-weight: 500;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .rba-input,
    .rba-textarea {
      width: 100%;
      border: 1px solid #cfd6e4;
      border-radius: 5px;
      background: #ffffff;
      color: var(--rba-text);
      font-size: 16px;
      padding: 14px 16px;
      box-shadow: none;
      outline: none;
    }

    .rba-input {
      height: 58px;
    }

    .rba-textarea {
      min-height: 128px;
      resize: vertical;
    }

    .rba-input:focus,
    .rba-textarea:focus {
      border-color: var(--rba-blue);
      box-shadow: 0 0 0 0.2rem rgba(23, 46, 99, 0.10);
    }

    .rba-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 10px;
    }

    .rba-action-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 5px;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(23, 46, 99, 0.14);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .rba-action-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .rba-btn-cancelar {
      background: #dc3545;
    }

    .rba-btn-confirmar {
      background: #198754;
    }

    .rba-alert {
      display: none;
      margin-bottom: 24px;
      border-radius: 10px;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .rba-sac-shell {
        padding: 32px 16px 24px;
      }

      .rba-action-row {
        grid-template-columns: 1fr;
      }

      .rba-page-title {
        font-size: 16px;
      }

      .rba-header-logo-img {
        max-width: 118px;
      }
    }
  </style>

  <script type="text/javascript">
    function valorCampo(id) {
      const el = document.getElementById(id);
      return el ? String(el.value || '').trim() : '';
    }

    function mostrarRetorno(tipo, mensagem) {
      const alerta = document.getElementById('rbaSacRetorno');
      if (!alerta) {
        alert(mensagem);
        return;
      }

      alerta.className = 'alert rba-alert alert-' + tipo;
      alerta.innerHTML = mensagem;
      alerta.style.display = 'block';
      alerta.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function setConfirmando(confirmando) {
      const btn = document.getElementById('BTNCONFIRMARDIRETO');
      const cancelar = document.getElementById('BTNCANCELARDIRETO');

      if (btn) {
        btn.disabled = confirmando;
        btn.innerHTML = confirmando
          ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Confirmando...'
          : '<strong>Confirmar</strong>';
      }

      if (cancelar) {
        cancelar.disabled = confirmando;
      }
    }

    function cancelar() {
      window.location.href = '/legacy-runtime/main';
    }

    async function confirmar() {
      const titulo = valorCampo('EDTTITULO');
      const descricao = valorCampo('MEMDESCRICAO');
      const informacoes = valorCampo('MEMINFO');

      if (!titulo) {
        mostrarRetorno('warning', 'Informe o título do SAC.');
        return;
      }

      if (!descricao) {
        mostrarRetorno('warning', 'Informe a descrição do SAC.');
        return;
      }

      setConfirmando(true);

      try {
        const response = await fetch('/api/modules/abrir-sac/confirmar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            titulo: titulo,
            descricao: descricao,
            info: informacoes,

            EdtTitulo: titulo,
            EDTTITULO: titulo,
            MemDescricao: descricao,
            MEMDESCRICAO: descricao,
            MemInfo: informacoes,
            MEMINFO: informacoes
          })
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.message || 'Erro ao abrir SAC.');
        }

        mostrarRetorno('success', result.message || 'SAC aberto com sucesso.');

        setTimeout(function() {
          window.location.href = '/legacy-runtime/main';
        }, 1400);
      } catch (e) {
        mostrarRetorno('danger', e && e.message ? e.message : String(e));
        setConfirmando(false);
      }
    }
  </script>
</head>

<body>
  <nav class="navbar navbar-expand-lg rba-page-header">
    <div class="row align-items-center w-100 mx-0">
      <div class="col-2" align="left">
        <button type="button" class="rba-back-btn ms-2" onclick="cancelar();" aria-label="Voltar">
          <i class="fa-sharp fa-solid fa-circle-chevron-left rba-back-icon"></i>
        </button>
      </div>

      <div class="col" align="center">
        <div class="rba-page-title">Abrir SAC</div>
      </div>

      <div class="col-2 pe-4" align="right">
        <img src="../wwwroot/RBA-header.png" class="img-fluid rba-header-logo-img" alt="RBA Elevadores">
      </div>
    </div>
  </nav>

  <main class="rba-sac-shell">
    <div id="rbaSacRetorno" class="alert rba-alert" role="alert"></div>

    <section class="rba-form-card">
      <div class="rba-field-group">
        <label for="EDTTITULO" class="form-label rba-field-label">Título:</label>
        <input type="text" id="EDTTITULO" name="EdtTitulo" data-iw-component="EdtTitulo" class="form-control rba-input legacy-input" autocomplete="off" />
      </div>

      <div class="rba-field-group">
        <label for="MEMDESCRICAO" class="form-label rba-field-label">Descrição:</label>
        <textarea id="MEMDESCRICAO" name="MemDescricao" data-iw-component="MemDescricao" class="form-control rba-textarea legacy-input" rows="5"></textarea>
      </div>

      <div class="rba-field-group">
        <label for="MEMINFO" class="form-label rba-field-label">Informações:</label>
        <textarea id="MEMINFO" name="MemInfo" data-iw-component="MemInfo" class="form-control rba-textarea legacy-input" rows="5"></textarea>
      </div>

      <div class="rba-action-row">
        <button type="button" id="BTNCANCELARDIRETO" class="rba-action-btn rba-btn-cancelar" onclick="cancelar();">
          <strong>Cancelar</strong>
        </button>

        <button type="button" id="BTNCONFIRMARDIRETO" class="rba-action-btn rba-btn-confirmar" onclick="confirmar();">
          <strong>Confirmar</strong>
        </button>
      </div>
    </section>
  </main>

  <!-- Mantidos apenas por compatibilidade com a estrutura legada/IntraWeb. -->
  <div class="row" style="display:none">
    <div class="col">
      <button type="button" id="IWBTNCANCEL" name="IWBtnCancel" data-iw-component="IWBtnCancel" class="btn btn-outline-dark legacy-btn">Cancel</button>
      <button type="button" id="IWBTNCONFIRMA" name="IWBtnConfirma" data-iw-component="IWBtnConfirma" class="btn btn-outline-dark legacy-btn">Confirma</button>
    </div>
  </div>

<script>window.RBA_MODULE = 'abrir-sac';</script>
<script src="/legacy-bridge.js"></script>
<div id="ResultadoMigracao" class="container-fluid my-3"></div>
</body>
</html>
