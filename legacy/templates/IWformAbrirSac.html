<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>

<link rel="stylesheet" href="../wwwroot/styles/style.css">
<!-- Our Custom CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.css">
<!-- Gráficos do Google -->
<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<!------ Include the above in your HEAD tag ---------->
<html lang="pt-br">

<head>
  <link rel="sortcut icon" href="../wwwroot/Ico.png" type="image/png" />
  <title> RBA - Abrir Sac </title>

  <style type="text/css">
    * {
      width: 100%;
    }

    textarea,
    input {
      width: 100% !important;
      padding: 15px 0 !important;
      margin-bottom: 10px !important;
    }

    .custom-btn {
            color: #FFF;
					  border-radius: 5px;
					  padding: 10px 25px;
					  font-family: 'Lato', sans-serif;
					  font-weight: 500;
					  background: transparent;
					  cursor: pointer;
					  transition: all 0.3s ease;
					  position: relative;
					  display: inline-block;
					   box-shadow:inset 2px 2px 2px 0px rgba(255,255,255,.5),
					   7px 7px 20px 0px rgba(0,0,0,.1),
					   4px 4px 5px 0px rgba(0,0,0,.1);
					  outline: none;
					}
  </style>

  <script type="text/javascript">
    function confirmar() {
      IWBTNCONFIRMA.click();
    }
    function cancelar() {
      IWBTNCANCEL.click();
    }
  </script>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
	    <div class="row align-items-center w-100">
	      <div class="col-2" align="left">
	        <font class="ms-2" color="#14285a"> 
	            <i class="fa-sharp fa-solid fa-circle-chevron-left fa-xl" style="cursor: pointer;" onclick="cancelar();"></i> 
	        </font>
	      </div>
	      <div class="col" align="center">
	        <strong> <font color="#14285a"> Abrir SAC </font> </strong>
	      </div>
	      <div class="col-2" align="right">
	        <img src="../wwwroot/RBA.png" class="img-fluid" style="max-width: 50px; max-height: 50px;">
	      </div>
	    </div>
	</nav>

  <div class="container w-100 h-100 align-items-center d-flex flex-column my-4">

    <br>
    <br>

    <div class="row">
      <div class="col w-100">
        <label for="EdtTitulo" class="form-label mx-auto" style="color: #14285a;"> Título: </label>
        <div>{%EdtTitulo%}</div>
      </div>
    </div>

    <br>

    <div class="row">
      <div class="col">
        <label for="MemDescricao" class="form-label" style="color: #14285a;"> Descrição: </label>
        <div>{%MemDescricao%}</div>
      </div>
    </div>

    <br>

    <div class="row">
      <div class="col">
        <label for="MemInfo" class="form-label" style="color: #14285a;"> Informações: </label>
        <div>{%MemInfo%}</div>
      </div>
    </div>

    <div class="row mx-4">
      <div class="col d-flex">
        <button type="button" class="btn btn-danger shadow-sm me-2 custom-btn bg-danger" onclick="cancelar();"> <strong> Cancelar </strong> </button>
        <button type="button" class="btn btn-success shadow-sm ms-2 custom-btn bg-success" onclick="confirmar();"> <strong> Confirmar </strong> </button>
      </div>
    </div>
  </div>

  <!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
  <div class="row" style="display:none">
    <div class="col">
      {%IWBtnCancel%}
      {%IWBtnConfirma%}
    </div>
  </div>
</body>

</html>
