    <script type="text/javascript">
        google.charts.load('current', {'packages':['table']});

        function carregaHtmls(nome, html) {
            $("#" + nome).html(html);
            if (typeof window.RBAMainAfterRender === 'function') {
                window.RBAMainAfterRender();
            }
        }

        function navEsquerda() {
            const side = document.getElementById("SideEsquerda");
            if (!side) return;

            if (side.style.width === "35%") {
                side.style.width = "0%";
            } else {
                side.style.width = "35%";
            }
        }

        function deslogar() {
            mensagem('SAINDO', 'Aguarde, deslogando...', 10000, 0, 1);
            BTNSAIR.click();
        }

        function mensagem(titulo, html, tempoFechar, mostraBotaoFechar, mostraSpinner) {
            document.getElementById('txtTituloMensagem').innerHTML = titulo;
            $("#corpoModalMensagem").html(html);

            if (tempoFechar > 0) {
                setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
            }

            document.getElementById('btnFechaModalMensagem').style.display = mostraBotaoFechar === 1 ? "block" : "none";
            document.getElementById('spinnerMensagem').style.display = mostraSpinner === 1 ? "block" : "none";

            btnModalMensagem.click();
        }

        function baixarArquivo() {
            console.log("DOWNLOAD http://steflifts.ddns.net:7000/arquivos/rbaiamcabo.apk");
        }

        function limparRuidoCorpoMain() {
            const corpo = document.getElementById('corpo');
            if (!corpo) return;

            const ruido = [
                "btnFechaModalMensagem.click",
                "btnFechaModalToken.click",
                "$('#corpo').html",
                "$(\"#corpo\").html",
                "'); btnFechaModalMensagem.click();",
                "');btnFechaModalMensagem.click();"
            ];

            const walker = document.createTreeWalker(corpo, NodeFilter.SHOW_TEXT);
            const remover = [];

            while (walker.nextNode()) {
                const node = walker.currentNode;
                const texto = (node.textContent || '').trim();
                if (!texto) continue;

                if (ruido.some(function(item) { return texto.indexOf(item) >= 0; })) {
                    remover.push(node);
                }
            }

            remover.forEach(function(node) { node.remove(); });
            corpo.querySelectorAll('script').forEach(function(script) { script.remove(); });
        }

        function textoLimpo(el) {
            return (el && el.textContent ? el.textContent : '').replace(/\s+/g, ' ').trim();
        }

        function normalizaTexto(txt) {
            return String(txt || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/\./g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toUpperCase();
        }

        function headingSetor(el) {
            const txt = normalizaTexto(textoLimpo(el));
            const setores = ['COMERCIAL', 'GERENCIAL', 'LOGISTICA', 'LOGÍSTICA', 'SUPORTE', 'TI', 'T.I'];
            for (const setor of setores) {
                const setorNormalizado = normalizaTexto(setor);
                if (txt === setorNormalizado || txt.indexOf(setorNormalizado) === 0) return setorNormalizado;
            }
            return '';
        }

        function botaoVisivel(btn) {
            if (!btn) return false;
            if (btn.offsetParent === null) return false;
            if ((btn.id || '').toUpperCase() === 'BTNSAIR') return false;
            if ((btn.id || '').toLowerCase().indexOf('modal') >= 0) return false;
            return textoLimpo(btn).length > 0;
        }

        function organizarCorpoMain() {
            const corpo = document.getElementById('corpo');
            if (!corpo || corpo.dataset.rbaMainOrganizando === '1') return;

            corpo.dataset.rbaMainOrganizando = '1';

            try {
                limparRuidoCorpoMain();

                const botoesSoltos = Array.from(corpo.querySelectorAll('button.custom-btn, button[class*="btn-"], input[type="button"]'))
                    .filter(botaoVisivel);

                if (!botoesSoltos.length) {
                    corpo.dataset.rbaMainOrganizado = '0';
                    return;
                }

                const filhos = Array.from(corpo.children);
                const grupos = [];
                let atual = null;

                filhos.forEach(function(el) {
                    const setor = headingSetor(el);

                    if (setor) {
                        atual = { setor: setor, heading: el, nodes: [] };
                        grupos.push(atual);
                        return;
                    }

                    if (atual) atual.nodes.push(el);
                });

                if (!grupos.length) {
                    const grade = document.createElement('div');
                    grade.className = 'rba-button-grid rba-setor-azul';

                    botoesSoltos.sort(function(a, b) {
                        return textoLimpo(a).localeCompare(textoLimpo(b), 'pt-BR', { sensitivity: 'base' });
                    });

                    botoesSoltos.forEach(function(btn) {
                        btn.classList.add('rba-btn-azul');
                        const cell = document.createElement('div');
                        cell.className = 'rba-button-cell';
                        cell.appendChild(btn);
                        grade.appendChild(cell);
                    });

                    corpo.innerHTML = '';
                    corpo.appendChild(grade);
                    corpo.dataset.rbaMainOrganizado = '1';
                    return;
                }

                grupos.forEach(function(grupo, index) {
                    const botoes = [];

                    grupo.nodes.forEach(function(node) {
                        node.querySelectorAll('button.custom-btn, button[class*="btn-"], input[type="button"]').forEach(function(btn) {
                            if (botaoVisivel(btn)) botoes.push(btn);
                        });
                    });

                    if (!botoes.length) return;

                    botoes.sort(function(a, b) {
                        return textoLimpo(a).localeCompare(textoLimpo(b), 'pt-BR', { sensitivity: 'base' });
                    });

                    const titulo = document.createElement('div');
                    titulo.className = 'rba-setor-titulo';
                    titulo.textContent = textoLimpo(grupo.heading) || grupo.setor;

                    const grade = document.createElement('div');
                    grade.className = 'rba-button-grid ' + (index % 2 === 0 ? 'rba-setor-azul' : 'rba-setor-verde');

                    botoes.forEach(function(btn) {
                        btn.classList.remove('rba-btn-azul', 'rba-btn-verde');
                        btn.classList.add(index % 2 === 0 ? 'rba-btn-azul' : 'rba-btn-verde');

                        const cell = document.createElement('div');
                        cell.className = 'rba-button-cell';
                        cell.appendChild(btn);
                        grade.appendChild(cell);
                    });

                    const divisor = document.createElement('hr');
                    divisor.className = 'rba-main-divider';

                    grupo.heading.replaceWith(titulo);
                    titulo.after(grade);
                    grade.after(divisor);

                    grupo.nodes.forEach(function(node) {
                        if (node && node.parentNode === corpo) node.remove();
                    });
                });

                corpo.dataset.rbaMainOrganizado = '1';
                limparRuidoCorpoMain();
            } finally {
                corpo.dataset.rbaMainOrganizando = '0';
            }
        }

        function agendarOrganizarCorpoMain() {
            const corpo = document.getElementById('corpo');
            if (!corpo) return;

            corpo.dataset.rbaMainOrganizado = '0';

            setTimeout(organizarCorpoMain, 0);
            setTimeout(organizarCorpoMain, 120);
            setTimeout(organizarCorpoMain, 400);
        }

        window.RBAMainAfterRender = agendarOrganizarCorpoMain;

        document.addEventListener('DOMContentLoaded', function() {
            const corpo = document.getElementById('corpo');
            if (!corpo) return;

            agendarOrganizarCorpoMain();

            const observer = new MutationObserver(function() {
                if (corpo.dataset.rbaMainOrganizando === '1') return;
                limparRuidoCorpoMain();
                agendarOrganizarCorpoMain();
            });

            observer.observe(corpo, { childList: true, subtree: true, characterData: true });
        });
    </script>
</head>
