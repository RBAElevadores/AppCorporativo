<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">

	<link rel="sortcut icon" href="../wwwroot/ico.png" type="image/png"/>
    <title> RBA - Técnico Online </title>

    <style type="text/css">
		@import "https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700";

   		@-webkit-keyframes animate-div {
                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }
    </style>

    <script type="text/javascript">

  		google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";

    	var modalAberto   = "";
    	var abrir         = "";
    	var tipoYesNoBox  = 0;

    	function modalAbrir(modal)
	    {
	    	if (modalAberto.indexOf(modal) === -1)
	    	{
	    		modalAberto = modalAberto + "|" + modal;
	    	}
	  	}

	    function modalFechar(modal)
		{
			modalAberto = modalAberto.replace("|"+modal,"");	
			
			abrir = modalAberto.substring(0, modalAberto.indexOf("|"));
			if (abrir === "")
			{
				abrir = modalAberto;
			}
			abrir = abrir.replace("|","");

			if (abrir === "modalVistoria")
			{
				btnModalVistoria.click();
			}
			else if (abrir === "modalEquipamentos")
			{
				btnAbrirModalEquipamentos.click();
			};

			//Garantia
			if (modalAberto === modal)
				modalAberto = "";

			if (modalAberto !== "")
				setTimeout('$("body").addClass("modal-open");', 700);
		}

		function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	if (modalAberto.indexOf('modalMensagem') === -1)
	    	{
	    		btnModalMensagem.click();
	    	} 

	    }

	    function abrirBotoes(grupo)
	    {
	    	document.getElementById('EDTGRUPO').value = grupo;
			AddChangedControl('EDTGRUPO');

			document.getElementById('txtTituloBotoes').innerHTML = grupo;

			BTNGRUPO.click();
	    }

	    function executar(seq)
	    {
	    	document.getElementById('EDTEXECUTAR').value = seq;
			AddChangedControl('EDTEXECUTAR');

			mensagem('Processando...','Aguarde...',0,0,1);

			BTNEXECUTAR.click();
	    }

	</script>
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-light bg-light">
	    <div class="row align-items-center w-100">
	      <div class="col-2" align="left">
	        <font class="ms-2" color="#14285a"> 
	            <i class="fa-sharp fa-solid fa-circle-chevron-left fa-xl" style="cursor: pointer;" onclick="BTNVOLTAR.click();"></i> 
	        </font>
	      </div>
	      <div class="col" align="center">
	        <strong> <font color="#14285a"> Ações Especiais </font> </strong>
	      </div>
	      <div class="col-2" align="right">
	        <img src="../wwwroot/RBA.png" class="img-fluid" style="max-width: 50px; max-height: 50px;">
	      </div>
	    </div>
	</nav>

	<div class="container" id="corpo">

		<!-- Preenchido automaticamente -->

	</div>



	<!-- Modal Mensagem -->
	<div class="modal fade" id="ModalMensagem" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="1" role="dialog" aria-labelledby="modal_Mensagem" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloMensagem"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMensagem" onclick="modalFechar('modalMensagem');">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div class="row">
						<div class="col">
							<div id="corpoModalMensagem">
								<!-- Preenchido automaticamente -->
							</div>
						</div>
						<div class="col" align="right">
							<div class="spinner-border text-primary" role="status" id="spinnerMensagem">
							  <span class="visually-hidden">...</span>
							</div>
						</div>
					</div>
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Mensagem -->

	<!-- Modal Botoes -->
	<div class="modal fade" id="ModalBotoes" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="modal_Botoes" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloBotoes"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalBotoes" onclick="modalFechar('modalBotoes');">
	            		</button>
					</div>
				</div>
				<div class="modal-body">
	          		
	          		<div class="container border rounded shadow py-2" id="corpoBotoes">

	          			<!-- Preenchido automaticamente -->

					</div>
	          
	        	</div>
	      	</div>
	    </div>
	</div>
	<!-- Modal Botoes -->

	<!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
	<div class="row" style="display:none">
		<div class="col">
			{%btnVoltar%}
			{%edtGrupo%}
			{%btnGrupo%}
			{%edtExecutar%}
			{%btnExecutar%}

			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalMensagem" id="btnModalMensagem" onclick="modalAbrir('modalMensagem');"> </button>
			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalBotoes" id="btnModalBotoes" onclick="modalAbrir('modalBotoes');"> </button>
		</div>
	</div>

</body>
</html>
