<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">

    <title> RBA - Técnico Online </title>

    <style type="text/css">
		@import "https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700";

   		@-webkit-keyframes animate-div {
                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }

        .sidenavesq{
            height: 100%;
            width: 0%;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: white;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .imgFundo {
        	background: white;
        	background-image: url(LogoRBAAzulOpaco.png);
        	background-position: center center;
        	background-size: 50%;
        	background-repeat: no-repeat;
        }

  	</style>

    <script type="text/javascript">

    	function carregaHtmls(nome,html)
      	{
        	$("#"+nome).html(html);    
      	}

      	function navEsquerda() 
	    {
	      if (document.getElementById("SideEsquerda").style.width === "30%") 
	      {
	        document.getElementById("SideEsquerda").style.width = "0%";
	      }
	      else
	      {
	        document.getElementById("SideEsquerda").style.width = "30%";
	      }
	    }

	    function deslogar()
	    {
	    	mensagem('SAINDO','Aguarde, deslogando...',10000,0,1);

	    	console.log("DESLOGAR");

	    	BTNSAIR.click();
	    }

	    function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	btnModalMensagem.click();
	    }

    </script>
</head>
<body class="imgFundo">

	<!-- LATERAL ESQUERDA -->
	<div id="SideEsquerda" class="sidenavesq shadow" style="background: #172e63">
		<strong> <font color="white">

			</ul>

				</div>
			</div>
		</strong> </font>
	</div>

		  			</font> </strong>

	<!-- CABEÇALHO --> 

	<!-- Page Content  -->
	<div class="container-fluid" style="height: 80%">

		<!-- Espaço por causa do CABECALHO -->
		<div style="height: 10%">
		</div>
		<!-- Espaço por causa do CABECALHO -->


	</div>


	


	<!-- Modal Mensagem -->
	<div class="modal fade" id="ModalMensagem" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="modal_Mensagem" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloMensagem"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMensagem">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div id="corpoModalMensagem">
						<!-- Preenchido automaticamente -->
					</div>

					<br>

					<div class="spinner-border text-primary" role="status" id="spinnerMensagem">
					  <span class="visually-hidden">...</span>
					</div>
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Mensagem -->


	<!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
	<div class="row" style="display:none">
		<div class="col">
			{%btnSair%}

			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalMensagem" id="btnModalMensagem"> </button>
		</div>
	</div>
