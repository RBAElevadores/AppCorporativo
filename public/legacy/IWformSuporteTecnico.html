    <script type="text/javascript">

    	google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";

    	var modalAberto   = "";
    	var abrir         = "";

    	var urlPDF        = "";

    	function selecionar(codigo)
	    {
	    	document.getElementById('EDTORIENTACAO').value = codigo;
	        AddChangedControl('EDTORIENTACAO'); //Serve para forçar alterar o valor, caso de evento async

			btnFechaModalPesquisa.click();

			mensagem("Abrindo Orientação","Aguarde...",10,0,1);

	        BTNCARREGAR.click();
	    }

    	function drawTable() 
    	{
			var data = google.visualization.arrayToDataTable(arrayGrafico);

			var options = {
							width: '100em',
							allowHtml: true
							};

			table = new google.visualization.Table(document.getElementById(tabela));
			 
			document.getElementById('TablePesquisa').style.display = "block";

			table.draw(data, options);
		}

		function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	if (modalAberto.indexOf('modalMensagem') === -1)
	    	{
	    		btnModalMensagem.click();
	    	} 

	    }

    	function modalAbrir(modal)
	    {
	    	if (modalAberto.indexOf(modal) === -1)
	    	{
	    		modalAberto = modalAberto + "|" + modal;
	    	}
	  	}

	    function modalFechar(modal)
		{
			modalAberto = modalAberto.replace("|"+modal,"");	
			
			abrir = modalAberto.substring(0, modalAberto.indexOf("|"));
			if (abrir === "")
			{
				abrir = modalAberto;
			}
			abrir = abrir.replace("|","");

			if (abrir === "modalPesquisa")
			{
				btnAbrirModalPesquisa.click();
			};

			//Garantia
			if (modalAberto === modal)
				modalAberto = "";

			if (modalAberto !== "")
				setTimeout('$("body").addClass("modal-open");', 700);
		}

    	function carregaHtmls(nome,html)
      	{
        	$("#"+nome).html(html);    
      	}

      	function abrirPesquisa()
	    {
			document.getElementById('TablePesquisa').style.display = "none";

			EDTPESQUISAR.value = "";
			AddChangedControl('EDTPESQUISAR');

			btnFechaModalPesquisa.click();

    		btnAbrirModalPesquisa.click();
	    }

	    function pesquisar()
	    {
        	AddChangedControl('EDTPESQUISAR');

        	mensagem('PESQUISANDO...','Aguarde, procurando...',0,0,1);

        	BTNPESQUISAR.click();
	    }

	    function abrirPDF(url)
	    {
	    	urlPDF = "https://docs.google.com/viewerng/viewer?url="+url+"&embedded=true";
	    	document.getElementById("frameDocs").src = urlPDF;

	    	//document.getElementById('txtURLPDF').innerHTML = url;

	    	document.getElementById('frameDocs').style.display = 'none';
	    	document.getElementById('mensagemCarregando').style.display = 'block';

	    	var iframe = document.getElementById('frameDocs');
		    iframe.onload = function() 
		    {
		      document.getElementById('frameDocs').style.display = 'block';
	    	  document.getElementById('mensagemCarregando').style.display = 'none';
		    };

	    	btnModalPDF.click();
	    }

	    function recarregarPDF()
	    {
	    	document.getElementById('mensagemCarregando').style.display = 'none';
	    	setTimeout("document.getElementById('mensagemCarregando').style.display = 'block';",500);

	    	document.getElementById("frameDocs").src = urlPDF;
	    }

	    function baixarArquivo(url)
	    {
	    	console.log("DOWNLOAD "+url);
	    }

    </script>
</head>
