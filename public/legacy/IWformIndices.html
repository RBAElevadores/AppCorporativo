	    function rbaDecodeJsString(raw)
	    {
	    	var out = '';
	    	var slash = String.fromCharCode(92);

	    	for (var i = 0; i < raw.length; i++)
	    	{
	    		var ch = raw.charAt(i);

	    		if (ch !== slash)
	    		{
	    			out += ch;
	    			continue;
	    		}

	    		var next = raw.charAt(i + 1);
	    		i++;

	    		if (next === 'n') out += String.fromCharCode(10);
	    		else if (next === 'r') out += String.fromCharCode(13);
	    		else if (next === 't') out += String.fromCharCode(9);
	    		else if (next === slash) out += slash;
	    		else if (next === "'") out += "'";
	    		else if (next === '"') out += '"';
	    		else out += next;
	    	}

	    	return out;
	    }

	    function rbaEhEspaco(ch)
	    {
	    	return ch === ' ' || ch === String.fromCharCode(10) || ch === String.fromCharCode(13) || ch === String.fromCharCode(9);
	    }

	    function rbaLerStringJs(texto, indiceInicial)
	    {
	    	var i = indiceInicial;

	    	while (i < texto.length && rbaEhEspaco(texto.charAt(i)))
	    	{
	    		i++;
	    	}

	    	var aspas = texto.charAt(i);

	    	if (aspas !== "'" && aspas !== '"')
	    	{
	    		return null;
	    	}

	    	i++;

	    	var raw = '';
	    	var slash = String.fromCharCode(92);

	    	for (; i < texto.length; i++)
	    	{
	    		var ch = texto.charAt(i);

	    		if (ch === slash)
	    		{
	    			raw += ch;

	    			if (i + 1 < texto.length)
	    			{
	    				raw += texto.charAt(i + 1);
	    				i++;
	    			}

	    			continue;
	    		}

	    		if (ch === aspas)
	    		{
	    			return {
	    				value: rbaDecodeJsString(raw),
	    				nextIndex: i + 1
	    			};
	    		}

	    		raw += ch;
	    	}

	    	return null;
	    }

	    function rbaExtrairHtmlJQuery(origem, seletor)
	    {
	    	var texto = String(origem || '');
	    	var pos = texto.indexOf(seletor);

	    	while (pos >= 0)
	    	{
	    		var htmlPos = texto.indexOf('.html', pos);

	    		if (htmlPos < 0)
	    		{
	    			return null;
	    		}

	    		var abre = texto.indexOf('(', htmlPos);

	    		if (abre < 0)
	    		{
	    			return null;
	    		}

	    		var resultado = rbaLerStringJs(texto, abre + 1);

	    		if (resultado)
	    		{
	    			return resultado.value;
	    		}

	    		pos = texto.indexOf(seletor, pos + seletor.length);
	    	}

	    	return null;
	    }

	    function rbaExtrairAbrirHtmlCompleto(origem)
	    {
	    	var texto = String(origem || '').trim();
	    	var nomeFuncao = 'abrirHtmlCompletoNoModalIndice';
	    	var pos = texto.indexOf(nomeFuncao);

	    	if (pos < 0)
	    	{
	    		return null;
	    	}

	    	var abre = texto.indexOf('(', pos + nomeFuncao.length);

	    	if (abre < 0)
	    	{
	    		return null;
	    	}

	    	var primeiro = rbaLerStringJs(texto, abre + 1);

	    	if (!primeiro)
	    	{
	    		return null;
	    	}

	    	var i = primeiro.nextIndex;

	    	while (i < texto.length && rbaEhEspaco(texto.charAt(i)))
	    	{
	    		i++;
	    	}

	    	var titulo = 'Índice / Análise';

	    	if (texto.charAt(i) === ',')
	    	{
	    		var segundo = rbaLerStringJs(texto, i + 1);

	    		if (segundo && segundo.value)
	    		{
	    			titulo = segundo.value;
	    		}
	    	}

	    	return {
	    		html: primeiro.value,
	    		titulo: titulo
	    	};
	    }

	    function rbaNormalizarPossivelHtmlEscapado(texto)
	    {
	    	var valor = String(texto || '');

	    	// Alguns retornos chegam como string JS já decodificada parcialmente.
	    	// Se ainda houver sequências literais 
 ou 	, converte para o iframe renderizar melhor.
	    	if (valor.indexOf('\n') >= 0 || valor.indexOf('\t') >= 0 || valor.indexOf('\"') >= 0)
	    	{
	    		valor = rbaDecodeJsString(valor);
	    	}

	    	return valor;
	    }

	    function rbaAbrirModalIndice(titulo, corpo)
	    {
	    	rbaFecharModalAguarde();

	    	document.getElementById('txtTituloIndice').innerHTML = titulo || 'Índice / Análise';
	    	document.getElementById('corpoModalIndice').innerHTML = corpo || '';

	    	btnModalIndice.click();
	    }

	    function rbaRenderizarRetornoIndice(retorno)
	    {
	    	var texto = String(retorno || '').trim();

	    	if (!texto)
	    	{
	    		rbaFecharModalAguarde();
	    		mensagem("Índice / Análise", "Consulta executada sem retorno.", 0, 1, 0);
	    		return;
	    	}

	    	// Forma 1: retorno legado chama abrirHtmlCompletoNoModalIndice("html completo", "titulo").
	    	var chamadaHtmlCompleto = rbaExtrairAbrirHtmlCompleto(texto);

	    	if (chamadaHtmlCompleto)
	    	{
	    		rbaFecharModalAguarde();
	    		abrirHtmlCompletoNoModalIndice(
	    			rbaNormalizarPossivelHtmlEscapado(chamadaHtmlCompleto.html),
	    			chamadaHtmlCompleto.titulo || 'Índice / Análise'
	    		);
	    		return;
	    	}

	    	// Forma 2: retorno legado monta diretamente o titulo e o corpo do modal via jQuery.
	    	var titulo = rbaExtrairHtmlJQuery(texto, '#txtTituloIndice') || 'Índice / Análise';
	    	var corpo = rbaExtrairHtmlJQuery(texto, '#corpoModalIndice');

	    	if (corpo !== null)
	    	{
	    		rbaAbrirModalIndice(titulo, rbaNormalizarPossivelHtmlEscapado(corpo));
	    		return;
	    	}

	    	// Forma 3: retorno já é o HTML completo ou parcial.
	    	if (texto.indexOf('<html') >= 0 || texto.indexOf('<body') >= 0 || texto.indexOf('<div') >= 0 || texto.indexOf('<table') >= 0 || texto.indexOf('<script') >= 0)
	    	{
	    		rbaFecharModalAguarde();
	    		abrirHtmlCompletoNoModalIndice(rbaNormalizarPossivelHtmlEscapado(texto), titulo);
	    		return;
	    	}

	    	// Forma 4: fallback, executa script legado.
	    	try
	    	{
	    		rbaFecharModalAguarde();
	    		new Function(texto)();
	    		return;
	    	}
	    	catch(e)
	    	{
	    		rbaFecharModalAguarde();
	    		mensagem("Erro", "Não foi possível montar o índice: " + (e && e.message ? e.message : String(e)), 0, 1, 0);
	    	}
	    }

	        	headers: { 'Content-Type': 'application/json' },
	        	body: JSON.stringify({
	        		script: txt,
	        		edtScript: txt,
	        		EDTSCRIPT: txt
	        	})
	        })
	        .then(function(response) {
	        	return response.json().then(function(result) {
	        		if (!response.ok || !result.ok) {
	        			throw new Error(result.message || 'Erro ao executar índice.');
	        		}
	        		return result;
	        	});
	        })
	        .then(function(result) {
	        	rbaRenderizarRetornoIndice(result.html || result.retorno || result.message || '');
	        })
	        .catch(function(error) {
	        	rbaFecharModalAguarde();
	        	mensagem("Erro", error && error.message ? error.message : String(error), 0, 1, 0);
	        });
	    }


	    function limparModalIndice() 
	    {
		  $("#corpoModalIndice").html("");
		  $("#txtTituloIndice").html("");
		}

	    function abrirHtmlCompletoNoModalIndice(htmlCompleto, titulo) 
	    {
		    $("#txtTituloIndice").html(titulo || "");

		    // Cria o iframe (altura ajustável)
		    $("#corpoModalIndice").html(`
		      <iframe id="iframeModalIndice"
		              style="width:100%; height:78vh; border:0; background:#ffffff;"
		              sandbox="allow-scripts allow-forms allow-same-origin allow-popups">
		      </iframe>
		    `);

		    const iframe = document.getElementById("iframeModalIndice");

		    // 1) Preferencial: srcdoc (mais simples)
		    // 2) Fallback: document.open/write/close (para WebViews antigas)
		    if ("srcdoc" in iframe) 
		    {
		      iframe.srcdoc = htmlCompleto;
		    } 
		    else 
		    {
		      const doc = iframe.contentWindow.document;
		      doc.open();
		      doc.write(htmlCompleto);
		      doc.close();
		    }

		    // Abre o modal
		    btnModalIndice.click();
		  }

	</script>
</head>
