    <script type="text/javascript">

      $(document).ready(function () {

                                        $('#sidebarCollapse').on('click', function () {

                                        });

                                    });

      function addChat(quem,hora,tipo,texto)
      {
        var html     = '';
        var alinhar  = '';
        var alinhar2 = '';

        if (quem === "RBA ELEVADORES")
        {
          alinhar  = "";
          alinhar2 = "";
        }
        else
        {
          alinhar  = "justify-content-end";
          alinhar2 = "right";
        }

        
        html = $('<div class="container-fluid pb-2" align="left"> <div class="row '+alinhar+'" align="'+alinhar2+'"> <div class="col-md-10 py-1 border border-secondary rounded"> <b> '+quem+' ('+hora+') </b> <br> '+texto+'</div> </div> </div>');

        $('#mensagens').append(html);

        //Joga o scroll do div da conversa pra baixo
        document.getElementById('mensagens').scrollTop = document.getElementById('mensagens').scrollHeight;
      }

      function marcarLido(quem)
      {
        var html = '';

        html = $('<img src="Check.png" height="20" width="20">');

        $('#'+quem).append(html)
      }
      
      function carregaHtmls(nome,html)
      {
        $("#"+nome).html(html);    
      }

      function atender(codigo,direto)
      {
        document.getElementById('EDTATENDIMENTO').value = codigo;
        AddChangedControl('EDTATENDIMENTO'); //Serve para forçar alterar o valor, caso de evento async

        BTNATENDER.click();
      }

      function EscondeSideBar()
      {
        $('#sidebar').toggleClass('active');
      }

      function mostrarDivs(opcao)
      {

        if (opcao === 1)
        {
          document.getElementById('divTicket').style.display = "block";
        }
        else
        {
          document.getElementById('divChat').style.display = "block";
        }

      }

      function salvaObservacaoTicket()
      {
        document.getElementById('EDTOBSERVACAO').value = document.getElementById('obsTicket').value;
        AddChangedControl('EDTOBSERVACAO'); //Serve para forçar alterar o valor, caso de evento async

        BTNSALVAROBSERVACAO.click();
      }

    </script>
