<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">

	<title> RBA - Técnico Online </title>

	<style type="text/css">

    	@import "https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700";

   		@-webkit-keyframes animate-div {
                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }

    </style>

    <script type="text/javascript">

    	google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";

    	var modalAberto   = "";
    	var abrir         = "";

    	function modalAbrir(modal)
	    {
	    	if (modalAberto.indexOf(modal) === -1)
	    	{
	    		modalAberto = modalAberto + "|" + modal;
	    	}
	  	}

	    function modalFechar(modal)
		{
			modalAberto = modalAberto.replace("|"+modal,"");	
			
			abrir = modalAberto.substring(0, modalAberto.indexOf("|"));

			if (abrir === "")
			{
				abrir = modalAberto;
			}
			abrir = abrir.replace("|","");

			if (abrir === "modalNotificacao")
			{
				btnModalNotificacao.click();
			};

			//Garantia
			if (modalAberto === modal)
				modalAberto = "";

			if (modalAberto !== "")
				setTimeout('$("body").addClass("modal-open");', 700);
		}

		function drawTable() 
    	{
			var data = google.visualization.arrayToDataTable(arrayGrafico);

			var options = {
							width: '100em',
							allowHtml: true
							};

			table = new google.visualization.Table(document.getElementById(tabela));
			 
			table.draw(data, options);
		}

        function delay(ms) {
            return new Promise(function(resolve) {
                setTimeout(resolve, ms);
            });
        }

        function executarRetornoHolerites(retorno) {
            const alvo = document.getElementById('tableHolerites');
            const conteudo = String(retorno || '').trim();

            if (!alvo) return;

            if (!conteudo) {
                alvo.innerHTML = '<div class="alert alert-secondary mb-0">Nenhum holerite encontrado.</div>';
                return;
            }

            try {
                new Function(conteudo)();
            } catch (e) {
                alvo.innerHTML = conteudo;
            }
        }

        async function carregarHolerites() {
            const alvo = document.getElementById('tableHolerites');

            if (alvo) {
                alvo.innerHTML = '<div class="alert alert-info mb-0">Carregando holerites...</div>';
            }

            try {
                const response = await fetch('/api/holerites/listar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || 'Erro ao carregar holerites.');
                }

                executarRetornoHolerites(result.retorno || result.html || '');
            } catch (e) {
                if (alvo) {
                    alvo.innerHTML = '<div class="alert alert-danger mb-0">' + (e && e.message ? e.message : String(e)) + '</div>';
                }
            }
        }

        async function baixar(seq)
        {
            mensagem("Holerite", "Gerando o arquivo, aguarde...", 0, 0, 1);

            document.getElementById('EDTSEQARQUIVO').value = seq;
            AddChangedControl('EDTSEQARQUIVO');

            try
            {
                const response = await fetch('/api/holerites/baixar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seqArquivo: seq,
                        EDTSEQARQUIVO: seq
                    })
                });

                const result = await response.json();

                if (!response.ok || !result.ok)
                {
                    throw new Error(result.message || 'Erro ao preparar o holerite.');
                }

                const nome = result.data && result.data.nome ? result.data.nome : ('Holerite_' + seq + '.pdf');

                await RBAHoleritesPoll(nome);
            }
            catch(e)
            {
                mensagem("Holerite", e && e.message ? e.message : String(e), 0, 1, 0);
            }
        }

        async function RBAHoleritesPoll(nome)
        {
            for (let tentativa = 0; tentativa < 12; tentativa++)
            {
                await delay(tentativa === 0 ? 600 : 1200);

                const response = await fetch('/api/holerites/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome })
                });

                const result = await response.json();

                if (!response.ok || !result.ok)
                {
                    throw new Error(result.message || 'Erro ao verificar arquivo do holerite.');
                }

                if (result.data && result.data.ready && result.data.downloadUrl)
                {
                    downloadArquivo(result.data.downloadUrl);
                    btnFechaModalMensagem.click();
                    return;
                }
            }

            mensagem("Holerite", "Houve algum problema! Tente novamente!", 0, 1, 0);
        }

        window.RBAHoleritesPoll = RBAHoleritesPoll;

        function downloadArquivo(url)
        {
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.rel = 'noopener';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (window.google && google.charts) {
                google.charts.setOnLoadCallback(carregarHolerites);
            } else {
                carregarHolerites();
            }
        });

	    function mensagem
(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	if (modalAberto.indexOf('modalMensagem') === -1)
	    	{
	    		btnModalMensagem.click();
	    	} 

	    }

	</script>

</head>

<div id="tableHolerites"></div>

	<!-- Modal Mensagem -->
	<div class="modal fade" id="ModalMensagem" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="1" role="dialog" aria-labelledby="modal_Mensagem" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloMensagem"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMensagem" onclick="modalFechar('modalMensagem');">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div id="corpoModalMensagem">
						<!-- Preenchido automaticamente -->
					</div>

					<br>

					<div class="spinner-border text-primary" role="status" id="spinnerMensagem">
					  <span class="visually-hidden">...</span>
					</div>
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Mensagem -->

	<!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
	<div class="row" style="display:none">
		<div class="col">
			<button type="button" id="BTNVOLTAR" name="btnVoltar" data-iw-component="btnVoltar" class="btn btn-outline-dark legacy-btn">Voltar</button>
			<input type="text" id="EDTSEQARQUIVO" name="edtSeqArquivo" data-iw-component="edtSeqArquivo" class="form-control legacy-input" />
			<button type="button" id="BTNBAIXAR" name="btnBaixar" data-iw-component="btnBaixar" class="btn btn-outline-dark legacy-btn">Baixar</button>

			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalMensagem" id="btnModalMensagem" onclick="modalAbrir('modalMensagem');"> </button>
		</div>
	</div>

<script>window.RBA_MODULE = 'holerites';</script>
