                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }
    </style>

    <script type="text/javascript">

    	var LogoEscura = 0;
    	var LogoClara = 0;
    	var EmpresaSistema = 0;


        function carregarLogo(tipo) 
        {
		    const file = event.target.files[0]; // Obtém o primeiro arquivo selecionado
		    if (tipo === 1)
		    {
		    	var imagem = document.getElementById('logoFundoEscuro');	
		    	var nomeImagem = 'LogoParceiro_FundoEscuro_'+EmpresaSistema+'.png';
		    }
		    else
		    {
		    	var imagem = document.getElementById('logoFundoClaro');	
		    	var nomeImagem = 'LogoParceiro_FundoClaro_'+EmpresaSistema+'.png';
		    };	
		    

		    if (file && file.type === 'image/png') 
		    {
		        // Exibe a imagem no elemento img
		        const reader = new FileReader();
		        
		        reader.onload = function(e) 
		        	{
		            	imagem.src = e.target.result;
		            	const base64Image = e.target.result.split(',')[1]; // Remove o prefixo 'data:image/png;base64,'

		            	// Cria um novo objeto XMLHttpRequest
				        let request = new XMLHttpRequest();

				        // Define o tipo de solicitação e a URL
				        request.open('POST', 'https://rbaelevadores.ddns.net:8112/imagensgeral', true);

				        // Função de retorno de chamada chamada quando a resposta é recebida
				        request.onload = function() 
				        {
				            if (request.status >= 200 && request.status < 400) 
				            {
				                const data = JSON.parse(request.responseText);
				                console.log('Sucesso:', data);
				            } else 
				            {
				                console.error('Erro ao fazer a requisição:', request.status);
				                refreshImage();
				            }
				        };

				        // Função de retorno de chamada chamada em caso de erro de rede
				        request.onerror = function() 
				        {
				            console.error('Erro de conexão com a API');
				            refreshImage();
				        };

				        const jsonData = JSON.stringify({
											                foto: base64Image,
											                tipo: 'png',    
											                nome: nomeImagem
											            });

				        request.send(jsonData);

		        	};
		        
		        reader.readAsDataURL(file); // Lê o conteúdo do arquivo como uma URL de dados
		    }
		}

    	function refreshImage() 
    	{
			var imgEscuro = document.getElementById('logoFundoEscuro');
			var imgClaro  = document.getElementById('logoFundoClaro');
			var timestamp = new Date().getTime(); // Obtém o timestamp atual
			
			if( LogoEscura === 1)
			{
				imgEscuro.src = 'LogoParceiro_FundoEscuro_'+EmpresaSistema+'.png?t=' + timestamp;
			}
			else
			{
				imgEscuro.src = 'BloqueadoBranco.png?t=' + timestamp;	
			}

			if( LogoClara === 1)
			{
				imgClaro.src = 'LogoParceiro_FundoClaro_'+EmpresaSistema+'.png?t=' + timestamp;
			}
			else
			{
				imgClaro.src = 'BloqueadoPreto.png?t=' + timestamp;
			}
		}

		// Chama a função de consultar a API quando a página carrega
	    window.onload = setTimeout("refreshImage();", 200);

    </script>
