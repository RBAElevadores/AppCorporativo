    <script type="text/javascript">

    	google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";

    	var modalAberto   = "";
    	var abrir         = "";

    	function modalAbrir(modal)
	    {
	    	if (modalAberto.indexOf(modal) === -1)
	    	{
	    		modalAberto = modalAberto + "|" + modal;
	    	}
	  	}

	    function modalFechar(modal)
			{
				modalAberto = modalAberto.replace("|"+modal,"");	
				
				abrir = modalAberto.substring(0, modalAberto.indexOf("|"));

				if (abrir === "")
				{
					abrir = modalAberto;
				}
				abrir = abrir.replace("|","");

				if (abrir === "modalNotificacao")
				{
					btnModalNotificacao.click();
				};

				//Garantia
				if (modalAberto === modal)
					modalAberto = "";

				if (modalAberto !== "")
					setTimeout('$("body").addClass("modal-open");', 700);
			}

			function drawTable() 
    	{
				var data = google.visualization.arrayToDataTable(arrayGrafico);

				var options = {
								width: '100em',
								allowHtml: true
								};

				table = new google.visualization.Table(document.getElementById(tabela));
				 
				table.draw(data, options);
			}


        // Override seguro: a procedure retorna arrayGrafico/tabela e chama drawTable().
        // Esta versão aguarda o Google Charts e usa largura 100%.
        drawTable = function()
        {
            if (!window.google || !google.visualization || !google.visualization.Table)
            {
                if (window.google && google.charts)
                {
                    google.charts.setOnLoadCallback(drawTable);
                }
                return;
            }

            var data = google.visualization.arrayToDataTable(arrayGrafico);

            var options = {
                width: '100%',
                allowHtml: true
            };

            table = new google.visualization.Table(document.getElementById(tabela));
            table.draw(data, options);
        };

			function visualizar(titulo,mensagem)
			{
				document.getElementById('txtTituloVisualizar').innerHTML = titulo;

				document.getElementById('txtMensagemVisualizar').innerHTML = mensagem;

				btnModalVisualizar.click();
			}

			function salvarNotificacao()
			{
	      AddChangedControl('EDTTITULO');  
	      AddChangedControl('EDTMENSAGEM'); 
	      AddChangedControl('EDTUSUARIO'); 

	      BTNSALVARNOTIFICACAO.click();
			}

		  function novaNotificacao()
		  {
		  	document.getElementById('EDTTITULO').value = "";
		  	AddChangedControl('EDTTITULO');  

		  	document.getElementById('EDTMENSAGEM').value = "";
	      AddChangedControl('EDTMENSAGEM'); 

	      document.getElementById('EDTUSUARIO').value = "";
	      AddChangedControl('EDTUSUARIO');

				document.getElementById('txtUsuario').innerHTML = "";

				btnModalNotificacao.click();
		  }

		  function pesquisar()
	    {
        	AddChangedControl('EDTPESQUISAR');

        	mensagem('PESQUISANDO...','Aguarde, procurando...',0,0,1);

        	BTNPESQUISAR.click();
	    }

	    function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	if (modalAberto.indexOf('modalMensagem') === -1)
	    	{
	    		btnModalMensagem.click();
	    	} 

	    }

	    function abrirPesquisa()
	    {
				document.getElementById('tableUsuarios').style.display = "none";

				EDTPESQUISAR.value = "";
				AddChangedControl('EDTPESQUISAR');

				btnFechaModalUsuarios.click();

    		btnAbrirModalUsuarios.click();
	    }

	    function selecionar(codigo,nome)
	    {
	    	document.getElementById('txtUsuario').innerHTML = nome;

	    	document.getElementById('EDTUSUARIO').value = codigo;
	      AddChangedControl('EDTUSUARIO'); //Serve para forçar alterar o valor, caso de evento async

				btnFechaModalUsuarios.click();
	    }

    </script>
