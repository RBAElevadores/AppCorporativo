<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="sortcut icon" href="../wwwroot/ico.png" type="image/png"/>
    <title> RBA - O.S. </title>
	

	<style type="text/css">

   		@-webkit-keyframes animate-div {
                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }

    </style>

    <script type="text/javascript">

    	google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";

    	var modalAberto   = "";
    	var abrir         = "";

    	function modalAbrir(modal)
	    {
	    	if (modalAberto.indexOf(modal) === -1)
	    	{
	    		modalAberto = modalAberto + "|" + modal;
	    	}
	  	}

	    function modalFechar(modal)
		{
			modalAberto = modalAberto.replace("|"+modal,"");	
			
			abrir = modalAberto.substring(0, modalAberto.indexOf("|"));
			if (abrir === "")
			{
				abrir = modalAberto;
			}
			abrir = abrir.replace("|","");

			/*if (abrir === "modalEquipamentos")
			{
				btnAbrirModalEquipamentos.click();
			};*/

			//Garantia
			if (modalAberto === modal)
				modalAberto = "";

			if (modalAberto !== "")
				setTimeout('$("body").addClass("modal-open");', 700);
		}

		function drawTable() 
    	{
			var data = google.visualization.arrayToDataTable(arrayGrafico);

			var options = {
							width: '100em',
							allowHtml: true
							};

			table = new google.visualization.Table(document.getElementById(tabela));
			 
			table.draw(data, options);
		}

		function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

	    	if (modalAberto.indexOf('modalMensagem') === -1)
	    	{
	    		btnModalMensagem.click();
	    	} 

	    }

	    function pesquisar()
	    {
        	AddChangedControl('EDTPESQUISAR');

        	mensagem('PESQUISANDO...','Aguarde, procurando...',0,0,1);
        	
        	BTNPESQUISAR.click();
	    }

	    function selecionar(OS)
	    {
	    	document.getElementById('EDTOS').value = OS;
	      	AddChangedControl('EDTOS'); //Serve para forçar alterar o valor, caso de evento async

			BTNOS.click();
	    }

    </script>
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-light bg-light">
	    <div class="row align-items-center w-100">
	      <div class="col-2" align="left">
	        <font class="ms-2" color="#14285a"> 
	            <i class="fa-sharp fa-solid fa-circle-chevron-left fa-xl" style="cursor: pointer;" onclick="BTNVOLTAR.click();"></i>

	        <strong> <font color="#14285a"> O.S. </font> </strong>

	      </div>
	    </div>
	</nav>

	<div class="container">

		<div class="container border border-primary rounded shadow py-2">

				<div class="col">
					<label for="EDTPESQUISAR" class="form-label"> Digite alguma informação para pesquisar: </label>
					<input type="text" id="EDTPESQUISAR" name="edtPesquisar" data-iw-component="edtPesquisar" class="form-control legacy-input" />
				</div>
			</div>

			<br>

			<div class="row align-items-center">
				<div class="col" align="center">
					<button type="button" class="btn btn-primary" onclick="pesquisar(0);">PESQUISAR</button>
				</div>
			</div>
		</div>

		<br>
		<hr>

		<div class="container border border-dark rounded py-2">
			<div class="row align-items-center">
				<div class="col-1">
					<font color="#14285a" size="2"> <strong> Legenda: </strong> </font>
				</div>
				<div class="col">
					<div class="row align-items-center">
						<div class="col" align="center">
							<font class="px-2 py-1" size="1" style="border: 1px solid black; border-radius: 10px; background: lightgreen; white-space: nowrap;"> <strong> Autorizada </strong> </font> 
							<font class="px-2 py-1 ms-1" size="1" style="border: 1px solid black; border-radius: 10px; background: red; white-space: nowrap;"> <strong> Pendente </strong> </font> 
						</div>
					</div>
				</div>
			</div>
		</div>
		<br>
		<div id="tableOS"></div>

	</div>



	<!-- Modal Mensagem -->
	<div class="modal fade" id="ModalMensagem" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="1" role="dialog" aria-labelledby="modal_Mensagem" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloMensagem"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMensagem" onclick="modalFechar('modalMensagem');">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div id="corpoModalMensagem">
						<!-- Preenchido automaticamente -->
					</div>

					<br>

					<div class="spinner-border text-primary" role="status" id="spinnerMensagem">
					  <span class="visually-hidden">...</span>
					</div>
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Mensagem -->

	<!-- Modal OS -->
	<div class="modal fade" id="ModalOS" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="1" role="dialog" aria-labelledby="modal_OSo" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">

							<font color="#172e63"> <h5> OS: <text id="txtOS"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalOS" onclick="modalFechar('modalOS');">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<font size="3" color="#172e63">
						<div id="corpoOS">
							<!-- Preenchido automaticamente -->
						</div>
					</font>
					
					<br>
					<hr>
					<br>

					<div class="row">
						<div class="col" align="center">
							<button type="button" class="btn btn-success btn-lg shadow" id="BTNAUTORIZAR"> AUTORIZAR </button>
						</div>
					</div>

					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal OS -->

	<!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
	<div class="row" style="display:none">
		<div class="col">
			<button type="button" id="BTNPESQUISAR" name="btnPesquisar" data-iw-component="btnPesquisar" class="btn btn-outline-dark legacy-btn">Pesquisar</button>
			<button type="button" id="BTNVOLTAR" name="btnVoltar" data-iw-component="btnVoltar" class="btn btn-outline-dark legacy-btn">Voltar</button>
			<input type="text" id="EDTOS" name="edtOS" data-iw-component="edtOS" class="form-control legacy-input" />
			<button type="button" id="BTNOS" name="btnOS" data-iw-component="btnOS" class="btn btn-outline-dark legacy-btn">O S</button>

			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalOS" id="btnModalOS" onclick="modalAbrir('modalOS');"> </button>
			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalMensagem" id="btnModalMensagem" onclick="modalAbrir('modalMensagem');"> </button>
		</div>
	</div>

<script>window.RBA_MODULE = 'os';</script>
