<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="sortcut icon" href="../wwwroot/ico.png" type="image/png"/>
    <title> RBA - Técnico Online </title>

    <style type="text/css">
		@import "https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700";

   		@-webkit-keyframes animate-div {
                          from { opacity: 0; margin-top: -50px;}
                          to { opacity: 1;margin-top: 0px;}
                      }

  	</style>

    <script type="text/javascript">

    	google.charts.load('current', {'packages':['table']});


    	var arrayGrafico  = [["",""],[0,0]];
    	var tabela        = "";
    	var ultimaObra    = 0;


    	function carregaHtmls(nome,html)
      	{
        	$("#"+nome).html(html);    
      	}

      	function drawTable() 
    	{
			var data = google.visualization.arrayToDataTable(arrayGrafico);

			var options = {
							width: '100em',
							allowHtml: true
							};

			table = new google.visualization.Table(document.getElementById(tabela));
			 
			table.draw(data, options);
		}

		function mensagem(titulo,html,tempoFechar,mostraBotaoFechar,mostraSpinner)
	    {
	    	
			const modalEl = document.getElementById('ModalMensagem');

	    	document.getElementById('txtTituloMensagem').innerHTML = titulo;
	    		
	    	$("#corpoModalMensagem").html(html);

	    	
	    	if (tempoFechar > 0) 
	    	{
	    		setTimeout(' btnFechaModalMensagem.click(); ', tempoFechar);
	    	}

	    	if (mostraBotaoFechar === 1) 
	    	{
	    		document.getElementById('btnFechaModalMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('btnFechaModalMensagem').style.display = "none";
	    	}

	    	if (mostraSpinner === 1) 
	    	{
	    		document.getElementById('spinnerMensagem').style.display = "block";
	    	}
	    	else
	    	{	
	    		document.getElementById('spinnerMensagem').style.display = "none";
	    	}

			if (!modalEl.classList.contains('show')) 
			{
  				document.getElementById('btnModalMensagem').click();
			}
	    	//btnModalMensagem.click();
	    }

	    function pesquisar()
	    {
        	AddChangedControl('EDTNOME');
        	AddChangedControl('EDTOBRA');
        	AddChangedControl('EDTAPELIDOOBRA');
        	AddChangedControl('EDTCIDADE');

        	mensagem('PESQUISANDO CLIENTES','Aguarde, procurando os clientes...',0,0,1);

        	BTNPESQUISAR.click();			
	    }

	    function visualizar(codCliente)
	    {
			document.getElementById('EDTVISUALIZAR').value = codCliente;
	        AddChangedControl('EDTVISUALIZAR'); //Serve para forçar alterar o valor, caso de evento async

	        BTNVISUALIZAR.click();
	    }

	    function minhaTela(obra)
	    {
	    	ultimaObra = obra;

			document.getElementById('EDTMINHATELA').value = obra;
	        AddChangedControl('EDTMINHATELA'); //Serve para forçar alterar o valor, caso de evento async

	        mensagem('MINHA TELA','Aguarde, carregando...',0,0,1);

	        BTNMINHATELA.click();
	    }

	    function filtrarFicha()
		{
			AddChangedControl('EDTPESQUISARFICHA');

			if (checkCalculados.checked)
			{
				document.getElementById('EDTCAMPOSCALCULADOS').value = "1";
			}
			else
			{
				document.getElementById('EDTCAMPOSCALCULADOS').value = "0";
			}
			AddChangedControl('EDTCAMPOSCALCULADOS');

			minhaTela(ultimaObra);
		}

    </script>
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-light bg-light">
	    <div class="row align-items-center w-100">
	      <div class="col-2" align="left">
	        <font color="#14285a"> 
	            <i class="fa-sharp fa-solid fa-circle-chevron-left fa-xl" style="cursor: pointer;" onclick="BTNVOLTAR.click();"></i> 
	        </font>
	      </div>
	      <div class="col" align="center">
	        <strong> <font color="#14285a"> CLIENTES </font> </strong>
	      </div>
	      <div class="col-2" align="right">
	        <img src="../wwwroot/RBA.png" class="img-fluid" style="max-width: 50px; max-height: 50px;">
	      </div>
	    </div>
	</nav>

	<div class="container">

		<div class="row">
			<div class="col">
			  <b> Pesquisar clientes </b>
			</div>
		</div>

		<div class="container border border-primary rounded shadow">

			<br>

			<font size="2">

				<div class="row">
					<div class="col">
						<label for="EDTNOME" class="form-label"> Nome: </label>
						<input type="text" id="EDTNOME" name="edtNome" data-iw-component="edtNome" class="form-control legacy-input" />
					</div>
				</div>

				<br>

				<div class="row">
					<div class="col">
						<label for="EDTCIDADE" class="form-label"> Cidade: </label>
						<input type="text" id="EDTCIDADE" name="edtCidade" data-iw-component="edtCidade" class="form-control legacy-input" />
					</div>
				</div>

				<br>

				<div class="row">
					<div class="col">
						<label for="EDTOBRA" class="form-label"> Nº Obra: </label>
						<input type="text" id="EDTOBRA" name="edtObra" data-iw-component="edtObra" class="form-control legacy-input" />
					</div>
				</div>

				<br>

				<div class="row">
					<div class="col">
						<label for="EDTAPELIDOOBRA" class="form-label"> Apelido Obra: </label>
						<input type="text" id="EDTAPELIDOOBRA" name="edtApelidoObra" data-iw-component="edtApelidoObra" class="form-control legacy-input" />
					</div>
				</div>

				<br>

				<hr>

				<div class="row">
					<div class="col" align="center">
						<button type="button" class="btn btn-outline-dark" onclick="pesquisar();"> <strong> PESQUISAR </strong> </button>
					</div>
				</div>

			</font>
			<br>

		</div>

		<br>

		<div id="TableClientes"></div>

	</div>


	<!-- Modal Informações -->
	  <div class="modal fade" id="ModalInformacoes" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="modal_Informacoes" aria-hidden="true">
	    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
	      <div class="modal-content border border-2 border-primary rounded">
	        <div class="modal-header" style="background: white;">
	          <div class="row w-100">
	            <div class="col" align="center">
	              <font color="#172e63"> <h5> <text id="txtTituloInformacoes"></text> </h5> </font>
	            </div>
	            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalInformacoes">
	            </button>
	          </div>
	        </div>
	        <div class="modal-body">

	          <div id="corpoModalInformacoes">
	            <!-- Preenchimento automatico -->
	          </div>
	          
	        </div>
	      </div>
	    </div>
	  </div>
	  <!-- Modal Informações -->


	<!-- Modal Mensagem -->
	<div class="modal fade" id="ModalMensagem" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="modal_Mensagem" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header" style="background: white;">
					<div class="row w-100">
						<div class="col" align="center">
							<font color="#172e63"> <h5> <text id="txtTituloMensagem"></text> </h5> </font>
						</div>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMensagem">
						</button>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div id="corpoModalMensagem">
						<!-- Preenchido automaticamente -->
					</div>

					<br>

					<div class="spinner-border text-primary" role="status" id="spinnerMensagem">
					  <span class="visually-hidden">...</span>
					</div>
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Mensagem -->

	<!-- Modal Minha Tela -->
	<div class="modal fade" id="ModalMinhaTela" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="1" role="dialog" aria-labelledby="modal_MinhaTela" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-xl" role="document">
			<div class="modal-content border border-2 border-primary rounded">
				<div class="modal-header shadow" style="background: #f7f7f7;">
					<div class="row align-items-center">
						<div class="row" align="right">
							<div class="col" align="center">
								<font color="#172e63"> <strong> <text id="txtTituloMinhaTela"></text> </strong> </font>
							</div>
							<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="btnFechaModalMinhaTela" onclick="modalFechar('modalMinhaTela');"></button>
						</div>

						<div class="row w-100 mt-3 border-top pt-2">
							<div class="col">
								<strong> <font size="2"> Filtro: </font> </strong>
							</div>
						</div>
						<div class="row w-100 align-items-center">
							<div class="col">
								<input type="text" id="EDTPESQUISARFICHA" name="edtPesquisarFicha" data-iw-component="edtPesquisarFicha" class="form-control legacy-input" />
							</div>
						</div>
						<div class="row w-100 mt-2 align-items-center">
							<div class="col">
								<input class="form-check-input" type="checkbox" id="checkCalculados" checked>
							  <label class="form-check-label" for="checkCalculados">
							    <font size=2> Não mostrar calculados </font>
							  </label>
							</div>
							<div class="col" align="center">
								<button type="button" class="btn btn-primary btn-sm w-100" onclick="filtrarFicha();">FILTRAR</button>
							</div>
						</div>
					</div>
				</div>
				<div class="modal-body">
					<br>
					
					<div id="corpoFicha">
						<!-- preenchido automaticamente -->
					</div>	          		
					
					<br>
				</div>
			</div>
		</div>
	</div>
	<!-- Modal Minha Tela -->


	<!-- Apenas estanciando os componentes que tem function para o javascript conseguir chamá-los ||| Estão invisíveis -->
	<div class="row" style="display:none">
		<div class="col">
			<button type="button" id="BTNVOLTAR" name="btnVoltar" data-iw-component="btnVoltar" class="btn btn-outline-dark legacy-btn">Voltar</button>
			<button type="button" id="BTNPESQUISAR" name="btnPesquisar" data-iw-component="btnPesquisar" class="btn btn-outline-dark legacy-btn">Pesquisar</button>
			<input type="text" id="EDTVISUALIZAR" name="edtVisualizar" data-iw-component="edtVisualizar" class="form-control legacy-input" />
			<button type="button" id="BTNVISUALIZAR" name="btnVisualizar" data-iw-component="btnVisualizar" class="btn btn-outline-dark legacy-btn">Visualizar</button>
			<input type="text" id="EDTMINHATELA" name="edtMinhaTela" data-iw-component="edtMinhaTela" class="form-control legacy-input" />
			<button type="button" id="BTNMINHATELA" name="btnMinhaTela" data-iw-component="btnMinhaTela" class="btn btn-outline-dark legacy-btn">Minha Tela</button>
			<input type="text" id="EDTCAMPOSCALCULADOS" name="edtCamposCalculados" data-iw-component="edtCamposCalculados" class="form-control legacy-input" />

			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalMensagem" id="btnModalMensagem"> </button>
			<button type="button" data-bs-toggle="modal" data-bs-target="#ModalInformacoes" id="btnModalInformacoes"> </button>
			<button type="button" data-bs-toggle="modal" data-bs-target="#modalMinhaTela" id="btnModalMinhaTela" onclick="modalAbrir('modalMinhaTela');"></button>
		</div>
	</div>

<script>window.RBA_MODULE = 'clientes';</script>
